services:
  - type: web
    name: van-list-2026
    runtime: docker
    plan: free
    healthCheckPath: /login
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_ADMIN_USERNAME
        value: admin
      - key: DEFAULT_ADMIN_PASSWORD
        value: admin123
      - key: JWT_EXPIRE_MINUTES
        value: "480"
      - key: DATABASE_URL
        fromDatabase:
          name: van-list-db
          property: connectionString

databases:
  - name: van-list-db
    databaseName: vanlist
    user: vanlist
    plan: free
